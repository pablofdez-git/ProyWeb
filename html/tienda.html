<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/general_style.css">
    <link rel="stylesheet" href="../css/tienda_style.css">
    <script src="../js/tienda_script.js" defer></script>
    <title>Shop NovaBrawl</title>
</head>
<body>
    <header class="header">
        <div class="header-izq">
            <a href="../index.html">
                <img src="../imagenes/Logotipo.png" class="logo">
            </a>

            <nav class="nav">
                <a href="./selectorPersonajes.html" class="nav-link">Personajes</a>
                <a href="./tienda.html" class="nav-link">Tienda</a>
                <a href="./info.html" class="nav-link">Saber más...</a>
            </nav>
        </div>

        <div class="header-der">
            <div class="saldo">
                <div class="monedas">
                    <span>🟡</span>
                    <span id="cantMonedas">150</span>
                </div>
                <div class="gemas">
                    <span>💎</span>
                    <span id="cantGemas">1200</span>
                </div>
            </div>

            <a href="./registro.html" class="boton-nav boton-jugar">
                REGISTRARSE
            </a>
        </div>
    </header>

    <main>
        <div class="izquierdo">
            <section class="bloque">
                <h2>Accesorios</h2>
                <div class="grid-productos">
                    <div class="producto">
                        <img src="../imagenes/pattern_medium.png">
                        <button class="boton-compra btn-monedas">10🟡</button>
                    </div>
                    <div class="producto">
                        <img src="../imagenes/pattern_medium.png">
                        <button class="boton-compra btn-gemas">20💎</button>
                    </div>
                </div>

            </section>
            <section class="bloque largo">
                <h2>Colores</h2>
                <div class="grid-productos">
                    <div class="producto">
                        <img src="../imagenes/pattern_medium.png" class="verde">
                        <button class="boton-compra btn-monedas">15🟡</button>
                    </div>
                    <div class="producto">
                        <img src="../imagenes/pattern_medium.png" class="morado">
                        <button class="boton-compra btn-gemas">30💎</button>
                    </div>
                </div>
            </section>
        </div>

        <div class="derecho">
            <section class="bloque">
                <h2>Personajes Variados</h2>
                <div class="grid-productos">
                    <div class="producto">
                        <img src="../imagenes/Personajes/Leafrox.png">
                        <button class="boton-compra btn-monedas">150🟡</button>
                    </div>
                    <div class="producto">
                        <img src="../imagenes/Personajes/Blaze.png">
                        <button class="boton-compra btn-gemas">450💎</button>
                    </div>
                    <div class="producto">
                        <img src="../imagenes/Personajes/Lumen.png">
                        <button class="boton-compra btn-monedas">250🟡</button>
                    </div>
                    <div class="producto">
                        <img src="../imagenes/Personajes/Mender.png">
                        <button class="boton-compra btn-gemas">500💎</button>
                    </div>
                    <div class="producto">
                        <img src="../imagenes/Personajes/Viper.png">
                        <button class="boton-compra btn-monedas">200🟡</button>
                    </div>
                    <div class="producto">
                        <img src="../imagenes/Personajes/Granite.png">
                        <button class="boton-compra btn-gemas">1200💎</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>Proyecto LLMM · Pablo · Mario · Jacobo</p>
    </footer>
</body>
</html>
